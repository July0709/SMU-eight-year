  <text x="100" y="340" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="108" font-weight="480" fill="#ededf3" letter-spacing="-0.02em">
    南医八年
  </text>

  <!-- Subtitle -->
  <text x="100" y="415" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="400" fill="#c3c3cc">
