      <stop offset="0%" stop-color="#171721" />
      <stop offset="100%" stop-color="#1e1e2a" />
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(237,237,243,0.06)" stroke-width="1"/>
