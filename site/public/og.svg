  <!-- Decorative card -->
  <rect x="936" y="170" width="500" height="540" rx="12" fill="#1e1e2a" stroke="rgba(237,237,243,0.10)" stroke-width="1" />
  <rect x="986" y="240" width="150" height="16" rx="8" fill="#5266eb" />
  <rect x="986" y="300" width="400" height="12" rx="6" fill="#2d2d3d" />
